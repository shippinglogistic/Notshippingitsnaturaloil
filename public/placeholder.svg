<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <!-- Background -->
  <rect width="1200" height="1200" fill="#1a3a2a"/>
  
  <!-- Subtle pattern -->
  <defs>
    <pattern id="leafPattern" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <path d="M60,10 C70,30 68,45 60,60 C52,45 50,30 60,10" fill="#22543d" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1200" height="1200" fill="url(#leafPattern)"/>
  
  <!-- Center circle background -->
  <circle cx="600" cy="520" r="200" fill="#0f2a1e" stroke="#22543d" stroke-width="3"/>
  
  <!-- Cannabis leaf silhouette -->
  <g transform="translate(600, 520)" fill="#22543d" opacity="0.6">
    <!-- Center leaf -->
    <path d="M0,-120 C20,-80 16,-40 0,0 C-16,-40 -20,-80 0,-120"/>
    <!-- Left leaves -->
    <path d="M-30,-100 C-60,-70 -70,-30 -40,10 C-30,-20 -20,-60 -30,-100"/>
    <path d="M-70,-80 C-110,-50 -110,-10 -70,30 C-50,0 -60,-50 -70,-80"/>
    <!-- Right leaves -->
    <path d="M30,-100 C60,-70 70,-30 40,10 C30,-20 20,-60 30,-100"/>
    <path d="M70,-80 C110,-50 110,-10 70,30 C50,0 60,-50 70,-80"/>
    <!-- Stem -->
    <rect x="-6" y="0" width="12" height="80" rx="6"/>
  </g>
  
  <!-- Oil drop icon -->
  <g transform="translate(600, 520)">
    <path d="M0,-60 C-30,0 -40,30 -40,50 C-40,80 -22,100 0,100 C22,100 40,80 40,50 C40,30 30,0 0,-60Z" 
          fill="#d97706" opacity="0.8"/>
    <ellipse cx="-12" cy="60" rx="8" ry="12" fill="#fbbf24" opacity="0.5"/>
  </g>
  
  <!-- Text -->
  <text x="600" y="780" text-anchor="middle" font-family="system-ui, sans-serif" font-size="42" font-weight="600" fill="#9ca3af">
    Image Coming Soon
  </text>
  <text x="600" y="830" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#6b7280">
    NaturalCannabisOil.shop
  </text>
</svg>
