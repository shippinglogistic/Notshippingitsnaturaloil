<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Oil drop with cannabis leaf inside -->
  <g id="logo-icon">
    <!-- Drop shape -->
    <path d="M30 10 C30 10, 20 20, 20 30 C20 38, 24 45, 30 45 C36 45, 40 38, 40 30 C40 20, 30 10, 30 10 Z" fill="#D4AF37" stroke="#1a3a2a" stroke-width="1.5"/>
    
    <!-- Cannabis leaf silhouette inside drop -->
    <path d="M30 20 L30 35 M30 22 C28 23, 27 25, 27 27 M30 22 C32 23, 33 25, 33 27 M30 25 C28 26, 26 28, 26 30 M30 25 C32 26, 34 28, 34 30 M30 28 C29 29, 28 31, 28 32 M30 28 C31 29, 32 31, 32 32" stroke="#1a3a2a" stroke-width="1.2" stroke-linecap="round"/>
    
    <!-- Subtle shine effect -->
    <ellipse cx="27" cy="25" rx="3" ry="5" fill="white" opacity="0.3"/>
  </g>
  
  <!-- Brand name -->
  <text x="50" y="28" font-family="serif" font-size="18" font-weight="700" fill="#1a3a2a" letter-spacing="0.5">Natural Cannabis Oil</text>
  
  <!-- Updated tagline: removed "SINCE 2020" and changed color from #666 to #D4AF37 (gold) for better visibility on dark green background -->
  <text x="50" y="42" font-family="sans-serif" font-size="9" font-weight="600" fill="#D4AF37" letter-spacing="1.5">PURE • POTENT • TRUSTED</text>
</svg>
