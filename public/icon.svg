<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Updated to golden oil drop with cannabis leaf icon for brand identity -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F4D03F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="90" cy="90" r="85" fill="#1a3a2a"/>
  
  <!-- Oil drop shape -->
  <path d="M90 30 C90 30, 60 60, 60 95 C60 125, 72 145, 90 145 C108 145, 120 125, 120 95 C120 60, 90 30, 90 30 Z" 
        fill="url(#goldGradient)" 
        stroke="#F4D03F" 
        stroke-width="2"/>
  
  <!-- Cannabis leaf inside drop -->
  <g transform="translate(90, 80)">
    <!-- Center leaf -->
    <path d="M0,-25 L0,30" stroke="#1a3a2a" stroke-width="3" stroke-linecap="round"/>
    <!-- Left leaves -->
    <path d="M0,-15 C-8,-12 -12,-8 -12,-2" stroke="#1a3a2a" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M0,-10 C-12,-7 -18,-2 -18,5" stroke="#1a3a2a" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M0,-5 C-10,-2 -15,3 -15,10" stroke="#1a3a2a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right leaves -->
    <path d="M0,-15 C8,-12 12,-8 12,-2" stroke="#1a3a2a" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M0,-10 C12,-7 18,-2 18,5" stroke="#1a3a2a" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M0,-5 C10,-2 15,3 15,10" stroke="#1a3a2a" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- Shine effect -->
  <ellipse cx="75" cy="60" rx="15" ry="25" fill="white" opacity="0.25"/>
</svg>
